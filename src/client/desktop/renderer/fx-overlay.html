<!DOCTYPE html>
<html>
<!-- Whole-screen effects canvas. A transparent, click-through, non-focusable
     window that renders the SAME visuals as the in-app overlay, so lightning
     and rain aren't trapped inside a minimized Electron window. Receives
     {type, opts} render commands from main via fx-overlay-preload.js.
     Keyframes below are a copy of the effects block in styles.css — this page
     deliberately loads no app CSS. -->
<head>
  <meta charset="utf-8">
  <style>
    html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; width: 100vw; height: 100vh; }
    .effects-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 9990; }
    @keyframes effectFadeOut { from { opacity: var(--fx-peak, var(--start-opacity, 0.3)); } to { opacity: 0; } }
    @keyframes effectParticleRise {
      from { transform: translateY(0) scale(1); opacity: var(--fx-peak, var(--start-opacity, 0.6)); }
      to { transform: translateY(-200px) scale(0.3); opacity: 0; }
    }
    @keyframes effectShake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70% { transform: translateX(calc(-1 * var(--shake-px, 3px))); }
      20%, 40%, 60% { transform: translateX(var(--shake-px, 3px)); }
      80% { transform: translateX(0); }
    }
    @keyframes effectSparkleTwinkle {
      0% { opacity: 0; transform: scale(0.3) rotate(0deg); }
      35% { opacity: var(--fx-peak, 1); transform: scale(1.15) rotate(20deg); }
      70% { opacity: calc(var(--fx-peak, 1) * 0.8); transform: scale(0.9) rotate(35deg); }
      100% { opacity: 0; transform: scale(0.4) rotate(45deg); }
    }
    @keyframes effectFireworkBurst {
      0% { opacity: 0; transform: translate(0, 0) scale(1); }
      8% { opacity: var(--fx-peak, 1); }
      100% { opacity: 0; transform: translate(var(--fx-dx, 40px), var(--fx-dy, 60px)) scale(0.5); }
    }
    @keyframes effectLightningFlicker {
      0% { opacity: 0; } 10% { opacity: var(--fx-peak, 1); } 25% { opacity: calc(var(--fx-peak, 1) * 0.35); }
      40% { opacity: calc(var(--fx-peak, 1) * 0.95); } 60% { opacity: calc(var(--fx-peak, 1) * 0.55); } 100% { opacity: 0; }
    }
    @media (prefers-reduced-motion: reduce) { .effects-overlay * { animation: none !important; } }
  </style>
</head>
<body>
  <!-- Both scripts MUST be external: the app's CSP (script-src 'self', applied
       to the shared default session) refuses inline blocks outright. -->
  <script src="effects-engine.js"></script>
  <script src="fx-overlay-boot.js"></script>
</body>
</html>
