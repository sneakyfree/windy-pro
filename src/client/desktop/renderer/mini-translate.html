<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws://127.0.0.1:* wss://api.deepgram.com wss://*.thewindstorm.uk https://*.thewindstorm.uk https://api.deepgram.com https://api.groq.com https://api.openai.com; media-src 'self' mediastream: blob: data:; img-src 'self' data:;">
    <title>Quick Translate</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1F2937;
            color: #F9FAFB;
            overflow: hidden;
            -webkit-app-region: no-drag;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 14px;
            gap: 14px;
            overflow-y: auto;
            min-height: 0;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 4px;
        }

        /* Ui scale slider — full-width row */
        .ui-scale-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 10px;
            background: rgba(99, 102, 241, 0.06);
            border-radius: 8px;
            border: 1px solid rgba(99, 102, 241, 0.1);
        }

        .ui-scale-label {
            font-size: 12px;
            color: #A5B4FC;
            font-weight: 700;
            white-space: nowrap;
        }

        .ui-scale-slider {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            background: linear-gradient(90deg, #374151 0%, #4B5563 100%);
            border-radius: 3px;
            outline: none;
        }

        .ui-scale-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #F59E0B;
            border: 2px solid #FBBF24;
            cursor: pointer;
            transition: transform 0.15s;
            box-shadow: 0 2px 6px rgba(245, 158, 11, 0.3);
        }

        .ui-scale-slider::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }

        .header-title {
            -webkit-app-region: drag;
            flex: 1;
        }

        .header h1 {
            font-size: 14px;
            font-weight: 600;
            color: #D1D5DB;
        }

        .close-btn {
            background: #374151;
            border: 1px solid #4B5563;
            color: #9CA3AF;
            width: 24px;
            height: 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.15s;
        }

        .close-btn:hover {
            background: #EF4444;
            color: #fff;
        }

        .lang-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .lang-select {
            flex: 1;
            background: #374151;
            color: #F9FAFB;
            border: 1px solid #4B5563;
            border-radius: 8px;
            padding: 10px 10px;
            font-size: 13px;
        }

        .swap-btn {
            background: #374151;
            border: 1px solid #4B5563;
            color: #9CA3AF;
            border-radius: 6px;
            width: 28px;
            height: 28px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.15s;
        }

        .swap-btn:hover {
            background: rgba(99, 102, 241, 0.2);
            color: #F9FAFB;
        }

        /* ── Mode tabs ── */
        .mode-tabs {
            display: flex;
            gap: 6px;
        }

        .mode-tab {
            flex: 1;
            background: #374151;
            border: 1px solid #4B5563;
            color: #9CA3AF;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
        }

        .mode-tab.active {
            background: rgba(99, 102, 241, 0.2);
            border-color: #6366F1;
            color: #A5B4FC;
        }

        /* ── Text mode ── */
        .text-mode {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-row {
            display: flex;
            gap: 6px;
        }

        .text-input {
            flex: 1;
            background: #374151;
            color: #F9FAFB;
            border: 1px solid #4B5563;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
            resize: none;
            font-family: inherit;
        }

        .text-input::placeholder {
            color: #6B7280;
        }

        .translate-btn {
            background: #22C55E;
            color: #fff;
            border: none;
            border-radius: 8px;
            width: 40px;
            font-size: 20px;
            cursor: pointer;
            transition: filter 0.15s;
        }

        .translate-btn:hover {
            filter: brightness(1.15);
        }

        .result {
            background: #374151;
            border-radius: 8px;
            padding: 10px;
            min-height: 40px;
            font-size: 14px;
            font-weight: 500;
            line-height: 1.5;
            display: none;
        }

        .result.visible {
            display: block;
        }

        .result .source {
            font-size: 11px;
            color: #9CA3AF;
            margin-bottom: 4px;
        }

        .result .translation {
            color: #F9FAFB;
        }

        .result .confidence {
            display: inline-block;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 8px;
            margin-top: 4px;
            font-weight: 600;
        }

        .listen-mode {
            flex: 1;
            display: none;
            flex-direction: column;
            gap: 8px;
            overflow: hidden;
            min-height: 0;
        }

        .listen-mode.active {
            display: flex;
        }

        .listen-controls {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .listen-btn {
            background: #22C55E;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .listen-btn.recording {
            background: #EF4444;
            animation: pulse-listen 1.5s ease-in-out infinite;
        }

        @keyframes pulse-listen {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
            }

            50% {
                box-shadow: 0 0 0 8px rgba(239, 68, 68, 0);
            }
        }

        .listen-badges {
            display: flex;
            gap: 4px;
            align-items: center;
            flex: 1;
            justify-content: flex-end;
        }

        /* ── Cockpit info panel ── */
        .cockpit {
            background: #111827;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 6px 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .cockpit-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
        }

        .cockpit-label {
            color: #6B7280;
            min-width: 72px;
            font-weight: 500;
        }

        .cockpit-value {
            color: #E5E7EB;
            font-weight: 600;
        }

        .cockpit-value.cloud {
            color: #A855F7;
        }

        .cockpit-value.local {
            color: #22C55E;
        }

        /* ── Toggle switch ── */
        .mode-toggle-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
        }

        .toggle-label {
            color: #9CA3AF;
            font-weight: 500;
        }

        .toggle-label.active {
            color: #F9FAFB;
            font-weight: 700;
        }

        .toggle-switch {
            position: relative;
            width: 32px;
            height: 16px;
            background: #374151;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle-switch.on {
            background: #0EA5E9;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.3s;
        }

        .toggle-switch.on::after {
            transform: translateX(16px);
        }

        /* ── Model selector ── */
        .model-select {
            background: #1F2937;
            color: #E5E7EB;
            border: 1px solid #4B5563;
            border-radius: 4px;
            padding: 2px 4px;
            font-size: 10px;
            outline: none;
            flex: 1;
            max-width: 200px;
        }

        /* ── Audio strobe ── */
        .audio-strobe {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #374151;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .audio-strobe.active {
            background: #22C55E;
            box-shadow: 0 0 6px rgba(34, 197, 94, 0.6);
            animation: strobe-pulse 0.8s ease-in-out infinite;
        }

        @keyframes strobe-pulse {

            0%,
            100% {
                box-shadow: 0 0 4px rgba(34, 197, 94, 0.3);
                transform: scale(1);
            }

            50% {
                box-shadow: 0 0 12px rgba(34, 197, 94, 0.8);
                transform: scale(1.3);
            }
        }

        .badge {
            font-size: 9px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
        }

        .badge-lang {
            background: rgba(59, 130, 246, 0.15);
            color: #60A5FA;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .badge-engine {
            background: rgba(34, 197, 94, 0.15);
            color: #22C55E;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .badge-engine.cloud {
            background: rgba(168, 85, 247, 0.15);
            color: #A855F7;
            border: 1px solid rgba(168, 85, 247, 0.3);
        }

        .live-transcript {
            flex: 1;
            background: #111827;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 10px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            font-size: 14px;
            line-height: 1.6;
            color: #E5E7EB;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .live-transcript::-webkit-scrollbar {
            width: 6px;
        }

        .live-transcript::-webkit-scrollbar-track {
            background: #1F2937;
            border-radius: 3px;
        }

        .live-transcript::-webkit-scrollbar-thumb {
            background: #4B5563;
            border-radius: 3px;
        }

        .live-transcript::-webkit-scrollbar-thumb:hover {
            background: #6B7280;
        }

        .model-info-bar {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
            padding: 4px 0;
        }

        .model-info-bar .badge {
            font-size: 9px;
        }

        .badge-model {
            background: rgba(251, 191, 36, 0.15);
            color: #FBBF24;
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        .badge-windytune {
            background: rgba(14, 165, 233, 0.15);
            color: #0EA5E9;
            border: 1px solid rgba(14, 165, 233, 0.3);
        }

        /* ── Chunk duration slider ── */
        .chunk-slider-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 2px 0;
        }

        .chunk-slider-row label {
            font-size: 10px;
            color: #9CA3AF;
            white-space: nowrap;
        }

        .chunk-slider {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            background: #374151;
            border-radius: 2px;
            outline: none;
        }

        .chunk-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #6366F1;
            cursor: pointer;
            border: 2px solid #818CF8;
            transition: transform 0.15s;
        }

        .chunk-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .chunk-duration-label {
            font-size: 11px;
            font-weight: 700;
            color: #A5B4FC;
            min-width: 28px;
            text-align: right;
        }

        /* ── Font size slider ── */
        .font-slider-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: rgba(245, 158, 11, 0.06);
            border-radius: 8px;
            border: 1px solid rgba(245, 158, 11, 0.1);
        }

        .font-slider-row label {
            font-size: 12px;
            color: #FBBF24;
            white-space: nowrap;
            font-weight: 700;
        }

        .font-slider {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            background: #374151;
            border-radius: 3px;
            outline: none;
        }

        .font-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #F59E0B;
            cursor: pointer;
            border: 2px solid #FBBF24;
            transition: transform 0.15s;
        }

        .font-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .font-size-label {
            font-size: 13px;
            font-weight: 700;
            color: #FBBF24;
            min-width: 30px;
            text-align: right;
        }

        /* ── Tooltip (JS-positioned) ── */
        #tooltip {
            position: fixed;
            display: none;
            background: #0F172A;
            color: #F1F5F9;
            border: 1px solid #475569;
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 12px;
            font-weight: 400;
            white-space: normal;
            max-width: 260px;
            width: max-content;
            z-index: 99999;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            line-height: 1.5;
            pointer-events: none;
        }

        .live-transcript .chunk {
            margin-bottom: 6px;
            padding-bottom: 6px;
            border-bottom: 1px solid #1F2937;
        }

        .live-transcript .chunk:last-child {
            border-bottom: none;
        }

        .live-transcript .chunk-time {
            font-size: 9px;
            color: #6B7280;
            margin-bottom: 2px;
        }

        .live-transcript .chunk-meta {
            font-size: 10px;
            color: #A5B4FC;
            margin-bottom: 4px;
            padding: 3px 6px;
            background: rgba(99, 102, 241, 0.08);
            border-radius: 4px;
            border-left: 2px solid #6366F1;
            line-height: 1.4;
        }

        /* Local Only toggle */
        .local-only-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
        }

        .local-only-row label {
            font-size: 11px;
            color: #9CA3AF;
            cursor: pointer;
        }

        .local-only-checkbox {
            width: 16px;
            height: 16px;
            accent-color: #22C55E;
            cursor: pointer;
        }

        .local-only-row.active label {
            color: #22C55E;
            font-weight: 600;
        }

        .live-transcript .placeholder-text {
            color: #6B7280;
            font-style: italic;
            text-align: center;
            padding: 20px 10px;
        }

        /* Contrast fix: #6B7280 on #111827 is only 4.0:1 at 9px — bump for WCAG AA */
        .live-transcript .chunk-time {
            color: #9CA3AF;
        }

        /* Focus-visible outlines for keyboard navigation */
        :focus-visible {
            outline: 2px solid #6366F1;
            outline-offset: 2px;
        }
        button:focus-visible,
        select:focus-visible,
        input:focus-visible,
        textarea:focus-visible {
            outline: 2px solid #6366F1;
            outline-offset: 2px;
        }
    </style>
</head>

            <!-- Mode tabs -->
            <div class="mode-tabs">
                <button class="mode-tab active" id="tabText" data-mode="text" role="tab" aria-selected="true"
                    data-tooltip="Type text and press Enter to translate.">⌨️ Text</button>
                <button class="mode-tab" id="tabListen" data-mode="listen" role="tab" aria-selected="false"
                    data-tooltip="Use your microphone to translate speech in real-time.">🎤 Live Listen</button>
            </div>

            <!-- Text mode input controls -->
            <div class="text-mode" id="textMode">
                <div class="input-row">
                    <textarea id="textInput" class="text-input" placeholder="Type text to translate…"
                              maxlength="10000"
                        rows="2" aria-label="Text to translate"></textarea>
                    <button class="translate-btn" id="translateBtn" aria-label="Translate"
                        data-tooltip="Send your text for translation.">→</button>
                </div>
            </div>

            <!-- Live Listen mode controls -->
            <div class="listen-mode" id="listenMode">
                <div class="listen-controls">
                    <button class="listen-btn" id="listenBtn" aria-label="Start listening"
                        data-tooltip="Start/stop listening. Your microphone will capture audio and translate in real-time.">🎤
                        Start Listening</button>
                    <div class="audio-strobe" id="audioStrobe"></div>
                    <div class="listen-badges">
                        <span class="badge badge-lang" id="detectedLangBadge" style="display:none;"></span>
                    </div>
                </div>
                <!-- Cockpit info panel -->
                <div class="cockpit" id="cockpitPanel">
                    <div class="mode-toggle-row">
                        <span class="toggle-label" id="manualLabel"
                            data-tooltip="You pick which model to use. Best for advanced users who know their hardware.">Manual</span>
                        <div class="toggle-switch on" id="windyTuneToggle" role="switch" tabindex="0"
                            aria-checked="true" aria-label="Toggle between Manual and WindyTune mode"
                            data-tooltip="Click to switch between Manual and WindyTune modes."></div>
                        <span class="toggle-label active" id="windyTuneLabel"
                            data-tooltip="WindyTune automatically picks the best model based on your hardware, language, and load. Just set it and forget it.">🌪️
                            WindyTune</span>
                    </div>
                    <div class="local-only-row" id="localOnlyRow"
                        data-tooltip="When checked, WindyTune will only choose between local models — nothing is ever sent to the cloud.">
                        <input type="checkbox" class="local-only-checkbox" id="localOnlyCheckbox">
                        <label for="localOnlyCheckbox">🔒 Local Only — keeps all processing on your device</label>
                    </div>
                    <div class="cockpit-row" id="modelSelectRow" style="display:none;"
                        data-tooltip="Choose which engine listens to speech and converts it to text.">
                        <span class="cockpit-label">🎤 Listening:</span>
                        <select class="model-select" id="listenModelSelect">
                            <optgroup label="☁️ Cloud">
                                <option value="cloud">☁️ Windy Cloud</option>
                            </optgroup>
                            <optgroup label="⚡ GPU STT">
                                <option value="windy-nano">Windy Nano — 73 MB, fastest</option>
                                <option value="windy-lite">Windy Lite — 140 MB, balanced</option>
                                <option value="windy-core" selected>Windy Core — 462 MB, recommended</option>
                                <option value="windy-edge">Windy Edge — 1444 MB, high-accuracy</option>
                                <option value="windy-plus">Windy Plus — 1458 MB, premium</option>
                                <option value="windy-turbo">Windy Turbo — 1544 MB, state-of-the-art</option>
                                <option value="windy-pro-engine">Windy Pro Engine — 2945 MB, ultra-fast</option>
                            </optgroup>
                            <optgroup label="🛡️ CPU STT">
                                <option value="windy-nano-ct2">Windy Nano CPU — 406 MB</option>
                                <option value="windy-lite-ct2">Windy Lite CPU — 668 MB</option>
                                <option value="windy-core-ct2">Windy Core CPU — 1760 MB</option>
                                <option value="windy-edge-ct2">Windy Edge CPU — 3824 MB</option>
                                <option value="windy-plus-ct2">Windy Plus CPU — 4872 MB</option>
                                <option value="windy-turbo-ct2">Windy Turbo CPU — 4200 MB</option>
                                <option value="windy-pro-engine-ct2">Windy Pro Engine CPU — 9456 MB</option>
                            </optgroup>
                            <optgroup label="🌍 Translation">
                                <option value="windy-translate-spark">Windy Translate Spark — 929 MB, fast</option>
                                <option value="windy-translate-standard">Windy Translate Standard — 2371 MB, higher quality</option>
                            </optgroup>
                        </select>
                    </div>
                    <div class="cockpit-row" id="translateModelRow" style="display:none;"
                        data-tooltip="Choose which engine translates the text to the target language.">
                        <span class="cockpit-label">📝 Translating:</span>
                        <select class="model-select" id="translateModelSelect">
                            <optgroup label="☁️ Cloud">
                                <option value="cloud">☁️ Windy Cloud</option>
                            </optgroup>
                            <optgroup label="⚡ GPU STT">
                                <option value="windy-nano">Windy Nano — 73 MB, fastest</option>
                                <option value="windy-lite">Windy Lite — 140 MB, balanced</option>
                                <option value="windy-core" selected>Windy Core — 462 MB, recommended</option>
                                <option value="windy-edge">Windy Edge — 1444 MB, high-accuracy</option>
                                <option value="windy-plus">Windy Plus — 1458 MB, premium</option>
                                <option value="windy-turbo">Windy Turbo — 1544 MB, state-of-the-art</option>
                                <option value="windy-pro-engine">Windy Pro Engine — 2945 MB, ultra-fast</option>
                            </optgroup>
                            <optgroup label="🛡️ CPU STT">
                                <option value="windy-nano-ct2">Windy Nano CPU — 406 MB</option>
                                <option value="windy-lite-ct2">Windy Lite CPU — 668 MB</option>
                                <option value="windy-core-ct2">Windy Core CPU — 1760 MB</option>
                                <option value="windy-edge-ct2">Windy Edge CPU — 3824 MB</option>
                                <option value="windy-plus-ct2">Windy Plus CPU — 4872 MB</option>
                                <option value="windy-turbo-ct2">Windy Turbo CPU — 4200 MB</option>
                                <option value="windy-pro-engine-ct2">Windy Pro Engine CPU — 9456 MB</option>
                            </optgroup>
                            <optgroup label="🌍 Translation">
                                <option value="windy-translate-spark">Windy Translate Spark — 929 MB, fast</option>
                                <option value="windy-translate-standard">Windy Translate Standard — 2371 MB, higher quality</option>
                            </optgroup>
                        </select>
                    </div>
                    <div class="cockpit-row" data-tooltip="Shows which engine is currently active for listening.">
                        <span class="cockpit-label">🎤 Listening:</span>
                        <span class="cockpit-value" id="listeningValue">—</span>
                    </div>
                    <div class="cockpit-row" data-tooltip="Shows which engine is currently active for translating.">
                        <span class="cockpit-label">📝 Translating:</span>
                        <span class="cockpit-value" id="translatingValue">—</span>
                    </div>
                </div>
                <div class="chunk-slider-row">
                    <label>⏱️ Chunk</label>
                    <input type="range" class="chunk-slider" id="chunkSlider" min="5" max="60" step="1" value="10"
                        aria-label="Chunk duration in seconds"
                        data-tooltip="How many seconds of audio to capture before sending for translation. Longer = smoother, shorter = faster.">
                    <span class="chunk-duration-label" id="chunkDurationLabel">10s</span>
                </div>
            </div>
        </div><!-- end controlPanel -->

        <!-- Shared sliders + unified transcript (NOT zoomed) -->
        <div class="font-slider-row">
            <label>Aa Size</label>
            <input type="range" class="font-slider" id="fontSlider" min="10" max="24" step="1" value="14"
                aria-label="Transcript font size"
                data-tooltip="Drag to make the transcript text bigger or smaller.">
            <span class="font-size-label" id="fontSizeLabel">14</span>
        </div>
        <div class="live-transcript" id="unifiedTranscript" role="log" aria-live="polite" aria-label="Translation output">
            <div class="placeholder-text">
                Choose <strong>⌨️ Text</strong> to type or <strong>🎤 Live Listen</strong> to speak.<br>
                All translations appear here in one conversation thread.
            </div>
        </div>
    </div>

    <div id="tooltip"></div>

    <script src="mini-translate.js"></script>
