<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: visible;
      user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .widget {
      width: var(--widget-size, 56px); height: var(--widget-size, 56px);
      display: flex; align-items: center; justify-content: center;
      position: absolute;
      /* Centered horizontally, sits above the fixed panel position (200px) */
      top: calc(180px - var(--widget-size, 56px));
      left: 50%;
      transform: translateX(-50%);
      cursor: grab;
      background: transparent;
      border-radius: 50%;
    }

    .widget.dragging { cursor: grabbing; }

    .glow-ring {
      position: absolute; width: 80%; height: 80%;
      border-radius: 50%; pointer-events: none;
    }

    .tornado {
      font-size: 28px; pointer-events: none;
      text-shadow:
        0 0 4px rgba(0,0,0,0.9), 0 0 8px rgba(0,0,0,0.7),
        1px 1px 2px rgba(0,0,0,0.9), -1px -1px 2px rgba(0,0,0,0.9),
        0 0 12px rgba(100,100,100,0.3);
      will-change: transform, filter;
    }

    /* Processing: amber pulse */
    .widget.processing .tornado {
      animation: amber-pulse 1.5s ease-in-out infinite;
    }
    .widget.processing .glow-ring {
      animation: amber-glow 1.5s ease-in-out infinite;
    }

    @keyframes amber-pulse {
      0%, 100% { transform: scale(1); opacity: 0.7; filter: drop-shadow(0 0 6px rgba(255,170,0,0.4)); }
      50% { transform: scale(1.08); opacity: 1; filter: drop-shadow(0 0 12px rgba(255,170,0,0.7)); }
    }
    @keyframes amber-glow {
      0%, 100% { box-shadow: 0 0 8px 2px rgba(255,170,0,0.2); }
      50% { box-shadow: 0 0 16px 6px rgba(255,170,0,0.5); }
    }

    /* Jolt on start/stop */
    .widget.jolt .tornado { animation: jolt 0.25s ease-out; }
    @keyframes jolt {
      0% { transform: scale(1); }
      30% { transform: scale(1.25); }
      60% { transform: scale(0.92); }
      100% { transform: scale(1); }
    }

    /* Recording: JS drives all jitter/glow reactively from voice levels. */
    .widget.recording .glow-ring {
      transition: width 0.12s ease-out, height 0.12s ease-out,
                  box-shadow 0.12s ease-out, opacity 0.12s ease-out;
    }

    /* ═══ Control Panel ═══ */
    .panel-container {
      position: absolute;
      /* Fixed position — never moves when widget size changes */
      top: 200px;
      left: 50%;
      width: 210px;
      transform: translateX(-50%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 100;
      -webkit-app-region: no-drag;
    }

    .save-btn {
      display: block;
      width: 100%;
      margin-top: 10px;
      padding: 8px 0;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .save-btn:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }
    .save-btn:active {
      background: var(--glow-color, #00FF88);
      color: #000;
    }
    .panel-container.open {
      pointer-events: auto;
      opacity: 1;
    }

    .panel {
      width: 210px;
      background: rgba(18, 18, 28, 0.94);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px 14px 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 2px 8px rgba(0,0,0,0.3);
      margin-top: 10px;
      overflow: hidden;
    }

    .panel h3 {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
      text-align: center;
    }

    .slider-row {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      gap: 7px;
    }
    .slider-row:last-child { margin-bottom: 4px; }

    .slider-icon {
      font-size: 13px;
      width: 18px;
      text-align: center;
      flex-shrink: 0;
    }

    .slider-label {
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      width: 52px;
      flex-shrink: 0;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      min-width: 0;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.1);
      outline: none;
      margin: 0;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--glow-color, #00FF88);
      cursor: pointer;
      box-shadow: 0 0 6px var(--glow-color, #00FF88);
    }

    /* Color swatches */
    .color-row {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      gap: 5px;
    }
    .swatch {
      width: 18px; height: 18px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s, transform 0.15s;
    }
    .swatch:hover { transform: scale(1.2); }
    .swatch.active { border-color: rgba(255,255,255,0.8); }

    /* Divider */
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 8px 0;
    }
  </style>
</head>
<body>
  <div class="widget" id="widget">
    <div class="glow-ring" id="glowRing"></div>
    <span class="tornado" id="tornado">🌪️</span>
  </div>

  <!-- Settings Panel (hidden by default) -->
  <div class="panel-container" id="panelContainer">
    <div class="panel" id="panel">
      <h3>⚙️ Widget Settings</h3>
      <p style="font-size:9px;color:rgba(255,255,255,0.35);text-align:center;margin:-6px 0 8px;">🎤 Record & talk to test sliders live</p>

      <div class="slider-row">
        <span class="slider-icon">📏</span>
        <span class="slider-label">Size</span>
        <input type="range" id="sliderSize" min="32" max="120" value="56">
      </div>

      <div class="slider-row">
        <span class="slider-icon">🫧</span>
        <span class="slider-label">Rest drift</span>
        <input type="range" id="sliderRest" min="0" max="100" value="15">
      </div>

      <div class="slider-row">
        <span class="slider-icon">🌊</span>
        <span class="slider-label">Voice shake</span>
        <input type="range" id="sliderVoice" min="0" max="200" value="100">
      </div>

      <div class="slider-row">
        <span class="slider-icon">💡</span>
        <span class="slider-label">Glow</span>
        <input type="range" id="sliderGlow" min="0" max="100" value="60">
      </div>

      <div class="slider-row">
        <span class="slider-icon">👁</span>
        <span class="slider-label">Idle opacity</span>
        <input type="range" id="sliderOpacity" min="20" max="100" value="80">
      </div>

      <div class="slider-row">
        <span class="slider-icon">🎤</span>
        <span class="slider-label">Sensitivity</span>
        <input type="range" id="sliderSensitivity" min="0" max="100" value="50">
      </div>

      <div class="divider"></div>

      <div class="color-row">
        <span class="slider-icon">🎨</span>
        <div class="swatch active" data-color="#00FF88" style="background:#00FF88"></div>
        <div class="swatch" data-color="#00D4FF" style="background:#00D4FF"></div>
        <div class="swatch" data-color="#A855F7" style="background:#A855F7"></div>
        <div class="swatch" data-color="#F472B6" style="background:#F472B6"></div>
        <div class="swatch" data-color="#FBBF24" style="background:#FBBF24"></div>
        <div class="swatch" data-color="#3B82F6" style="background:#3B82F6"></div>
        <div class="swatch" data-color="#EF4444" style="background:#EF4444"></div>
        <div class="swatch" data-color="#FFFFFF" style="background:#FFFFFF"></div>
      </div>

      <button class="save-btn" id="saveBtn">✓ Save & Close</button>
    </div>
  </div>

  <script src="mini-widget.js"></script>
</body>
</html>
