<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
    }

    .widget {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      cursor: grab;
      background: transparent;
      -webkit-app-region: drag;
    }

    .widget.dragging { cursor: grabbing; }

    .glow-ring {
      position: absolute; width: 80%; height: 80%;
      border-radius: 50%; pointer-events: none;
    }

    .tornado {
      font-size: 28px; pointer-events: none;
      text-shadow:
        0 0 4px rgba(0,0,0,0.9), 0 0 8px rgba(0,0,0,0.7),
        1px 1px 2px rgba(0,0,0,0.9), -1px -1px 2px rgba(0,0,0,0.9),
        0 0 12px rgba(100,100,100,0.3);
      will-change: transform, filter;
    }

    /* Processing: amber pulse */
    .widget.processing .tornado {
      animation: amber-pulse 1.5s ease-in-out infinite;
    }
    .widget.processing .glow-ring {
      animation: amber-glow 1.5s ease-in-out infinite;
    }

    @keyframes amber-pulse {
      0%, 100% { transform: scale(1); opacity: 0.7; filter: drop-shadow(0 0 6px rgba(255,170,0,0.4)); }
      50% { transform: scale(1.08); opacity: 1; filter: drop-shadow(0 0 12px rgba(255,170,0,0.7)); }
    }
    @keyframes amber-glow {
      0%, 100% { box-shadow: 0 0 8px 2px rgba(255,170,0,0.2); }
      50% { box-shadow: 0 0 16px 6px rgba(255,170,0,0.5); }
    }

    /* Jolt on start/stop */
    .widget.jolt .tornado { animation: jolt 0.25s ease-out; }
    @keyframes jolt {
      0% { transform: scale(1); }
      30% { transform: scale(1.25); }
      60% { transform: scale(0.92); }
      100% { transform: scale(1); }
    }

    /* Recording baseline glow (JS handles the rest) */
    .widget.recording .tornado {
      filter: drop-shadow(0 0 4px rgba(0,255,136,0.3));
    }
  </style>
</head>
<body>
  <div class="widget" id="widget">
    <div class="glow-ring" id="glowRing"></div>
    <span class="tornado" id="tornado">🌪️</span>
  </div>
  <script src="mini-widget.js"></script>
</body>
</html>
