<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'self' 'unsafe-inline'" />
  <title>Send Feedback</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a; color: #e6edf3; padding: 22px;
    }
    h1 { font-size: 16px; margin-bottom: 6px; }
    p { font-size: 12px; color: #9aa4b2; line-height: 1.5; margin-bottom: 14px; }
    textarea {
      width: 100%; height: 150px; resize: none; border-radius: 8px;
      border: 1px solid #30363d; background: #1a1f26; color: #e6edf3;
      font-size: 13px; padding: 10px; font-family: inherit;
    }
    textarea:focus { outline: 1px solid #7C3AED; }
    .row { display: flex; justify-content: flex-end; gap: 10px; margin-top: 14px; }
    button {
      border: none; border-radius: 7px; cursor: pointer; font-size: 13px;
      font-weight: 600; padding: 9px 18px;
    }
    .send { background: #7C3AED; color: #fff; }
    .send:hover { background: #6D28D9; }
    .send:disabled { background: #4c1d95; opacity: 0.6; cursor: default; }
    .cancel { background: none; color: #8b949e; border: 1px solid #30363d; }
  </style>
</head>
<body>
  <h1>Send feedback</h1>
  <p>
    Tell us what's working and what isn't. This opens your email app with a
    message to feedback@windyword.ai — your text goes only into that email
    (plus your app version and OS), never into analytics.
  </p>
  <textarea id="text" maxlength="4000" placeholder="Your feedback…" autofocus></textarea>
  <div class="row">
    <button class="cancel" id="cancelBtn">Cancel</button>
    <button class="send" id="sendBtn">Open in Email</button>
  </div>
  <script>
    (function () {
      var sendBtn = document.getElementById('sendBtn');
      var cancelBtn = document.getElementById('cancelBtn');
      var text = document.getElementById('text');
      sendBtn.addEventListener('click', function () {
        sendBtn.disabled = true;
        try {
          window.windyAPI.intel.sendFeedback(text.value || '').then(function () {
            window.close();
          }).catch(function () { sendBtn.disabled = false; });
        } catch (_) { sendBtn.disabled = false; }
      });
      cancelBtn.addEventListener('click', function () { window.close(); });
    })();
  </script>
</body>
</html>
