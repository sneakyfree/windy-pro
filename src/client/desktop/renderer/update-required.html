<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'self' 'unsafe-inline'" />
  <title>Update Required</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a; color: #e6edf3; height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card { max-width: 420px; padding: 32px; text-align: center; }
    .icon { font-size: 44px; margin-bottom: 16px; }
    h1 { font-size: 19px; margin-bottom: 10px; }
    p { font-size: 13px; color: #9aa4b2; line-height: 1.55; margin-bottom: 22px; }
    .btn {
      display: inline-block; border: none; border-radius: 8px; cursor: pointer;
      font-size: 14px; font-weight: 600; padding: 11px 26px;
      background: #7C3AED; color: #fff; margin-bottom: 12px;
    }
    .btn:hover { background: #6D28D9; }
    .quit {
      background: none; border: none; color: #6B7280; font-size: 12px;
      cursor: pointer; text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔄</div>
    <h1>Update required</h1>
    <p>
      This version of Windy Word is no longer supported.
      Please download the latest version<span id="ver"></span> to keep going —
      it's free and takes under a minute.
    </p>
    <button class="btn" id="downloadBtn">Download the update</button>
    <br />
    <button class="quit" id="quitBtn">Quit Windy Word</button>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var url = params.get('url') || 'https://windyword.ai/#download';
      var v = params.get('v');
      if (v) document.getElementById('ver').textContent = ' (v' + v + ')';
      document.getElementById('downloadBtn').addEventListener('click', function () {
        try { window.windyAPI.openExternalUrl(url); } catch (_) { }
      });
      document.getElementById('quitBtn').addEventListener('click', function () {
        window.close(); // main.js quits the app when this window closes
      });
    })();
  </script>
</body>
</html>
