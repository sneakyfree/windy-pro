##
## Windy Chat — Docker Compose (K Services)
##
## Orchestrates all 4 chat microservices alongside the existing
## deploy/docker-compose.yml (account-server, api, etc.) and
## deploy/synapse/docker-compose.yml (Synapse homeserver).
##
## Usage:
##   docker compose -f deploy/docker-compose.chat.yml up -d
##
## Or combine with the main stack:
##   docker compose \
##     -f deploy/docker-compose.yml \
##     -f deploy/docker-compose.chat.yml \
##     up -d
##

services:

  # ── K2: Chat Onboarding Service ──
  chat-onboarding:
    image: node:20-alpine
    working_dir: /app
    command: ["node", "server.js"]
    ports:
      - "8101:8101"
    environment:
      - PORT=8101
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER:-}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL:-noreply@windypro.com}
      - SYNAPSE_URL=${SYNAPSE_URL:-http://synapse:8008}
      - SYNAPSE_REGISTRATION_SECRET=${SYNAPSE_REGISTRATION_SECRET:-}
      - SYNAPSE_SERVER_NAME=${SYNAPSE_SERVER_NAME:-chat.windypro.com}
    volumes:
      - ../services/chat-onboarding:/app:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8101/health"]
      interval: 15s
      timeout: 3s
      retries: 3

  # ── K3: Contact Discovery Service ──
  chat-directory:
    image: node:20-alpine
    working_dir: /app
    command: ["node", "server.js"]
    ports:
      - "8102:8102"
    environment:
      - PORT=8102
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER:-}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
    volumes:
      - ../services/chat-directory:/app:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8102/health"]
      interval: 15s
      timeout: 3s
      retries: 3

  # ── K6: Push Notification Gateway ──
  chat-push-gateway:
    image: node:20-alpine
    working_dir: /app
    command: ["node", "server.js"]
    ports:
      - "8103:8103"
    environment:
      - PORT=8103
      - FIREBASE_SERVICE_ACCOUNT=${FIREBASE_SERVICE_ACCOUNT:-}
      - APNS_KEY_PATH=${APNS_KEY_PATH:-}
      - APNS_KEY_ID=${APNS_KEY_ID:-}
      - APNS_TEAM_ID=${APNS_TEAM_ID:-}
      - APNS_BUNDLE_ID=${APNS_BUNDLE_ID:-com.windypro.chat}
    volumes:
      - ../services/chat-push-gateway:/app:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8103/health"]
      interval: 15s
      timeout: 3s
      retries: 3

  # ── K8: Encrypted Cloud Backup ──
  chat-backup:
    image: node:20-alpine
    working_dir: /app
    command: ["node", "server.js"]
    ports:
      - "8104:8104"
    environment:
      - PORT=8104
      - R2_BUCKET=${R2_BUCKET:-windy-chat-backups}
      - R2_ENDPOINT=${R2_ENDPOINT:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
    volumes:
      - ../services/chat-backup:/app:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8104/health"]
      interval: 15s
      timeout: 3s
      retries: 3

networks:
  default:
    name: windy-chat
