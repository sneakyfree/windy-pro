# Windy Chat — Nginx Reverse Proxy for Synapse
# K1.1.4: DNS & SSL (DNA Strand K)
#
# Routes:
#   /_matrix/client/* → Synapse client API
#   /.well-known/matrix/* → Discovery endpoints
#   SSL termination via Let's Encrypt

# Rate limiting
limit_req_zone $binary_remote_addr zone=matrix_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=matrix_login:10m rate=5r/m;

upstream synapse_backend {
    server synapse:8008;
}

# ── HTTP → HTTPS Redirect ──
server {
    listen 80;
    server_name chat.windypro.com;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Server ──
server {
    listen 443 ssl http2;
    server_name chat.windypro.com;

    # SSL — Let's Encrypt certificates
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max upload size (100MB for media sharing — K4)
    client_max_body_size 100m;

    # ── .well-known discovery endpoints ──
    # These allow Matrix clients to discover the homeserver automatically.

    location /.well-known/matrix/server {
        default_type application/json;
        return 200 '{"m.server": "chat.windypro.com:443"}';
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
    }

    location /.well-known/matrix/client {
        default_type application/json;
        return 200 '{"m.homeserver": {"base_url": "https://chat.windypro.com"}, "m.identity_server": {"base_url": "https://chat.windypro.com"}}';
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
    }

    # ── Matrix Client API ──
    location /_matrix/client {
        proxy_pass http://synapse_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate limiting
        limit_req zone=matrix_api burst=30 nodelay;

        # WebSocket support (for /sync long-polling)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── Matrix Login (stricter rate limiting) ──
    location /_matrix/client/v3/login {
        proxy_pass http://synapse_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Strict rate limiting for login endpoint
        limit_req zone=matrix_login burst=3 nodelay;
    }

    # ── Matrix Media API ──
    location /_matrix/media {
        proxy_pass http://synapse_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Large uploads for media (100MB — K4)
        client_max_body_size 100m;
        proxy_read_timeout 120s;

        limit_req zone=matrix_api burst=20 nodelay;
    }

    # ── Synapse Admin API (restricted) ──
    location /_synapse/admin {
        # Only accessible from internal network
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;

        proxy_pass http://synapse_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Health check ──
    location /health {
        proxy_pass http://synapse_backend/health;
    }

    # Default — deny everything else
    location / {
        return 404;
    }
}
