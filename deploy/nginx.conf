# Rate limiting zones (must be defined before use in server blocks)
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=oauth_token:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=oauth_authorize:10m rate=30r/m;

upstream windy_api {
    server api:8000;
}

upstream windy_accounts {
    server account-server:8098;
}

upstream windy_translate {
    server translate-api:8099;
}

upstream windy_storage {
    server cloud-storage:8100;
}

server {
    listen 80;
    server_name windypro.thewindstorm.uk;
    
    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name windypro.thewindstorm.uk;
    
    # SSL certificates (Cloudflare Origin or Let's Encrypt)
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=63072000" always;
    
    # Max body size for media uploads
    client_max_body_size 50m;

    # Health check endpoint (no auth)
    location /health {
        proxy_pass http://windy_api;
    }
    
    # Account Server — auth endpoints
    location /api/v1/auth/ {
        proxy_pass http://windy_accounts;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Rate limiting for auth
        limit_req zone=api burst=10 nodelay;
    }
    
    # Account Server — recording endpoints (CRUD, stats, media streaming)
    location /api/v1/recordings {
        proxy_pass http://windy_accounts;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Rate limiting
        limit_req zone=api burst=20 nodelay;
    }

    # REST API (cloud engine)
    location /api/ {
        proxy_pass http://windy_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Rate limiting
        limit_req zone=api burst=20 nodelay;
    }

    # Translation API (E1 — NLLB-200 dynamic translation)
    location /translate {
        proxy_pass http://windy_translate;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Rate limiting (translation is CPU-heavy)
        limit_req zone=api burst=10 nodelay;
    }

    # Cloud Storage API (R2-backed — file uploads, downloads, usage)
    location /api/storage/ {
        proxy_pass http://windy_storage;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Allow large file uploads (500MB)
        client_max_body_size 500m;
        
        # Rate limiting
        limit_req zone=api burst=20 nodelay;
    }

    # Identity API (Phase 10.0 — Unified Windy Identity)
    location /api/v1/identity/ {
        proxy_pass http://windy_accounts;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate limiting
        limit_req zone=api burst=10 nodelay;
    }

    # OAuth2 Token endpoint — stricter rate limit (10 req/min)
    location = /api/v1/oauth/token {
        proxy_pass http://windy_accounts;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        limit_req zone=oauth_token burst=5 nodelay;
    }

    # OAuth2 Authorize endpoint — moderate rate limit (30 req/min)
    location = /api/v1/oauth/authorize {
        proxy_pass http://windy_accounts;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        limit_req zone=oauth_authorize burst=10 nodelay;
    }

    # OAuth2 — remaining endpoints (device, consent, userinfo, clients)
    location /api/v1/oauth/ {
        proxy_pass http://windy_accounts;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        limit_req zone=api burst=10 nodelay;
    }

    # JWKS endpoint (Phase 4 — public keys for RS256 token verification)
    location = /.well-known/jwks.json {
        proxy_pass http://windy_accounts;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS: allow cross-origin JWKS fetch for RS256 verification
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Cache-Control "public, max-age=3600";
    }

    # OIDC Discovery (Phase 5 — OpenID Connect provider metadata)
    location = /.well-known/openid-configuration {
        proxy_pass http://windy_accounts;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS: allow cross-origin OIDC discovery
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Cache-Control "public, max-age=3600";
    }

    # Matrix .well-known (Strand K — Chat federation discovery)
    location /.well-known/matrix/server {
        default_type application/json;
        return 200 '{"m.server": "chat.windypro.com:443"}';
    }
    location /.well-known/matrix/client {
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
        return 200 '{"m.homeserver": {"base_url": "https://chat.windypro.com"}}';
    }

    # Cloud Storage — file operations (upload, download, delete)
    location /files/ {
        proxy_pass http://windy_storage;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        client_max_body_size 500m;
        limit_req zone=api burst=20 nodelay;
    }
    
    # WebSocket streaming
    location /ws/ {
        proxy_pass http://windy_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    
    # Static files (web client — served from web_static docker volume)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
