# Rate limiting zone (must be defined before use in server blocks)
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

upstream windy_api {
    server api:8000;
}

upstream windy_accounts {
    server account-server:8098;
}

upstream windy_translate {
    server translate-api:8099;
}

server {
    listen 80;
    server_name windypro.thewindstorm.uk;
    
    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name windypro.thewindstorm.uk;
    
    # SSL certificates (Cloudflare Origin or Let's Encrypt)
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=63072000" always;
    
    # Max body size for media uploads
    client_max_body_size 50m;

    # Health check endpoint (no auth)
    location /health {
        proxy_pass http://windy_api;
    }
    
    # Account Server — auth endpoints
    location /api/v1/auth/ {
        proxy_pass http://windy_accounts;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Rate limiting for auth
        limit_req zone=api burst=10 nodelay;
    }
    
    # Account Server — recording endpoints (CRUD, stats, media streaming)
    location /api/v1/recordings {
        proxy_pass http://windy_accounts;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Rate limiting
        limit_req zone=api burst=20 nodelay;
    }

    # REST API (cloud engine)
    location /api/ {
        proxy_pass http://windy_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Rate limiting
        limit_req zone=api burst=20 nodelay;
    }

    # Translation API (E1 — NLLB-200 dynamic translation)
    location /translate {
        proxy_pass http://windy_translate;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Rate limiting (translation is CPU-heavy)
        limit_req zone=api burst=10 nodelay;
    }
    
    # WebSocket streaming
    location /ws/ {
        proxy_pass http://windy_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    
    # Static files (web client — served from web_static docker volume)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
