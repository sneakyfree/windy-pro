# Windy Pro — Production Docker Compose
# Usage: docker compose -f docker-compose.production.yml --env-file .env.production up -d
#
# Requires: .env.production with all secrets (see .env.production.example)
# Build context for all Windy services is the repository root.

services:
  account-server:
    build:
      context: ..
      dockerfile: account-server/Dockerfile
    ports:
      - "8098:8098"
    environment:
      - DATABASE_URL=postgres://windy:${POSTGRES_PASSWORD}@postgres:5432/windy_identity
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_PRIVATE_KEY_PATH=/keys/private.pem
      - NODE_ENV=production
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - OIDC_ISSUER=${OIDC_ISSUER}
      - ETERNITAS_WEBHOOK_SECRET=${ETERNITAS_WEBHOOK_SECRET}
      - SYNAPSE_URL=http://synapse:8008
      - SYNAPSE_REGISTRATION_SECRET=${SYNAPSE_REGISTRATION_SECRET}
      - SYNAPSE_SERVER_NAME=${SYNAPSE_SERVER_NAME:-chat.windypro.com}
    volumes:
      - keys:/keys
      - uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8098/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  chat-onboarding:
    build:
      context: ..
      dockerfile: services/chat-onboarding/Dockerfile
    ports:
      - "8101:8101"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SYNAPSE_URL=http://synapse:8008
      - SYNAPSE_REGISTRATION_SECRET=${SYNAPSE_REGISTRATION_SECRET}
      - SYNAPSE_SERVER_NAME=${SYNAPSE_SERVER_NAME:-chat.windypro.com}
    depends_on:
      - account-server
    restart: unless-stopped

  chat-directory:
    build:
      context: ..
      dockerfile: services/chat-directory/Dockerfile
    ports:
      - "8102:8102"
    environment:
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - account-server
    restart: unless-stopped

  chat-push-gateway:
    build:
      context: ..
      dockerfile: services/chat-push-gateway/Dockerfile
    ports:
      - "8103:8103"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - FCM_SERVICE_ACCOUNT=${FCM_SERVICE_ACCOUNT}
      - APNS_KEY_ID=${APNS_KEY_ID}
      - APNS_TEAM_ID=${APNS_TEAM_ID}
    depends_on:
      - account-server
    restart: unless-stopped

  chat-backup:
    build:
      context: ..
      dockerfile: services/chat-backup/Dockerfile
    ports:
      - "8104:8104"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-windy-chat-backups}
    depends_on:
      - account-server
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=windy_identity
      - POSTGRES_USER=windy
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U windy -d windy_identity"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certs:/etc/letsencrypt
    depends_on:
      - account-server
      - chat-onboarding
      - chat-directory
      - chat-push-gateway
      - chat-backup
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  keys:
  uploads:
  certs:
