# Wave 13 Phase 1 — nginx site for api.windyword.ai
#
# Host-installed nginx (not in-container) terminates TLS and reverse-
# proxies to the account-server container listening on 127.0.0.1:8098
# via docker's network_mode: host.
#
# Install at /etc/nginx/sites-available/api.windyword.ai.conf and
# symlink to sites-enabled/. certbot --nginx -d api.windyword.ai
# populates the ssl_certificate lines at FIRE 5; until then nginx
# will refuse to start on :443 — that's fine, we boot HTTP-only for
# the ACME challenge, then certbot flips us to HTTPS.

# HTTP — ACME challenge + redirect
server {
    listen 80;
    listen [::]:80;
    server_name api.windyword.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — proxied to account-server:8098
# certbot --nginx inserts ssl_certificate + ssl_certificate_key lines
# here at FIRE 5. Before then, this server block should be commented
# out so nginx can start on port 80 alone.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.windyword.ai;

    # Populated by certbot at FIRE 5:
    # ssl_certificate     /etc/letsencrypt/live/api.windyword.ai/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.windyword.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 100m;

    # Wave 8 SSE — disable buffering so POST /api/v1/agent/hatch
    # streams to clients without being held by nginx output buffer.
    location /api/v1/agent/hatch {
        proxy_pass http://127.0.0.1:8098;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        chunked_transfer_encoding on;
    }

    # Stripe webhooks need raw body — no body buffering / rewriting.
    location /api/v1/stripe {
        proxy_pass http://127.0.0.1:8098;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
    }

    location / {
        proxy_pass http://127.0.0.1:8098;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
