# Wave 13 Phase 1 — nginx site for api.windyword.ai
#
# Host-installed nginx (not in-container) terminates TLS and reverse-
# proxies to the account-server container listening on 127.0.0.1:8098
# via docker's network_mode: host.
#
# This file is deployed in two phases:
#   Pre-certbot:  only the :80 server block is active (ssl_include_guard
#                 below expands to nothing). nginx starts HTTP-only and
#                 serves the ACME http-01 challenge.
#   Post-certbot: an include under /etc/letsencrypt/live/<domain> lands
#                 in /etc/nginx/conf.d/... with the ssl_* directives; we
#                 use `include /etc/windypro/ssl.conf;` indirection so
#                 the 443 block always parses, even when the cert isn't
#                 issued yet.
#
# The previous iteration wrapped the entire 443 block in `# ` comments
# and relied on certbot --nginx to edit the file in place. certbot
# couldn't see the commented-out proxy block and instead added its SSL
# listen directives to the :80 redirect block — producing an infinite
# 301→https→301 loop. Keeping both blocks uncommented + gating ssl_*
# via include avoids that whole category of bug.

# HTTP — ACME challenge + unconditional 301 to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name api.windyword.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — proxied to account-server:8098. Cert paths come from the
# include file written by the bootstrap (points at certbot's live
# symlinks after FIRE 5 runs; a self-signed dummy during bootstrap
# so `nginx -t` passes before certbot runs).
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.windyword.ai;

    include /etc/windypro/ssl.conf;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 100m;

    # Wave 8 SSE — disable buffering so POST /api/v1/agent/hatch
    # streams to clients without being held by nginx output buffer.
    location /api/v1/agent/hatch {
        proxy_pass http://127.0.0.1:8098;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        chunked_transfer_encoding on;
    }

    # Stripe webhooks need raw body — no body buffering / rewriting.
    location /api/v1/stripe {
        proxy_pass http://127.0.0.1:8098;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
    }

    location / {
        proxy_pass http://127.0.0.1:8098;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
