version: '3.8'

services:
  # FastAPI Cloud Transcription API
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - WINDY_API_KEY=${WINDY_API_KEY:?Set WINDY_API_KEY in .env}
      - WINDY_JWT_SECRET=${WINDY_JWT_SECRET:?Set WINDY_JWT_SECRET in .env}
      - DATABASE_URL=postgresql://windy:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/windy_pro
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - model_cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

  # Account Server (H1 + H2 — auth, recordings, media)
  account-server:
    build: ../services/account-server
    environment:
      - PORT=8098
      - JWT_SECRET=${WINDY_JWT_SECRET:?Set WINDY_JWT_SECRET in .env}
      - DATABASE_PATH=/data/accounts.db
      - MEDIA_PATH=/data/media
    volumes:
      - account_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8098/health" ]
      interval: 15s
      timeout: 5s
      retries: 3

  # Translate API (E1 — NLLB-200 CTranslate2 dynamic translation)
  translate-api:
    build: ../services/translate-api
    environment:
      - PORT=8099
      - MODEL_PATH=/app/models/nllb-200-600M
      - DB_PATH=/data/cache.db
      - NODE_ENV=production
    volumes:
      - translate_models:/app/models
      - translate_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8099/health" ]
      interval: 30s
      timeout: 5s
      start_period: 120s
      retries: 3

  # Nginx reverse proxy (SSL termination, WS proxy, rate limiting)
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - web_static:/usr/share/nginx/html
    depends_on:
      - api
      - account-server
      - translate-api
    restart: unless-stopped

  # PostgreSQL for cloud vault storage
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: windy_pro
      POSTGRES_USER: windy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U windy" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for rate limiting and session cache
  redis:
    image: redis:7-alpine
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
  model_cache:
  web_static:
  account_data:
  translate_models:
  translate_data:
