version: '3.8'

services:
  # ── Web Frontend (Vite built static files served by Nginx) ──
  web:
    image: nginx:1.25-alpine
    ports:
      - "3000:80"
    volumes:
      - ./src/client/web/dist:/usr/share/nginx/html:ro
      - ./deploy/nginx-spa.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      account-server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:80/" ]
      interval: 15s
      timeout: 3s
      retries: 3

  # ── Account Server (Auth, recordings, translations, admin) ──
  account-server:
    build: ./account-server
    ports:
      - "8098:8098"
    environment:
      - PORT=8098
      - JWT_SECRET=${WINDY_JWT_SECRET:?Set WINDY_JWT_SECRET in .env}
      - DATABASE_PATH=/data/accounts.db
      - MEDIA_PATH=/data/media
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - NODE_ENV=production
    volumes:
      - account_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8098/health" ]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Transcription API (FastAPI + faster-whisper) ──
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - WINDY_API_KEY=${WINDY_API_KEY:?Set WINDY_API_KEY in .env}
      - WINDY_JWT_SECRET=${WINDY_JWT_SECRET:?Set WINDY_JWT_SECRET in .env}
      - DATABASE_URL=postgresql://windy:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/windy_pro
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - model_cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

  # ── Translate API (NLLB-200 CTranslate2) ──
  translate-api:
    build: ./services/translate-api
    ports:
      - "8099:8099"
    environment:
      - PORT=8099
      - MODEL_PATH=/app/models/nllb-200-600M
      - DB_PATH=/data/cache.db
      - NODE_ENV=production
    volumes:
      - translate_models:/app/models
      - translate_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8099/health" ]
      interval: 30s
      timeout: 5s
      start_period: 120s
      retries: 3

  # ── Cloud Storage API (R2-backed file storage) ──
  cloud-storage:
    build: ./services/cloud-storage
    ports:
      - "8100:8100"
    environment:
      - PORT=8100
      - JWT_SECRET=${WINDY_JWT_SECRET:?Set WINDY_JWT_SECRET in .env}
      - ADMIN_SECRET=${WINDY_ADMIN_SECRET:-windypro-admin-2026}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_BUCKET=${R2_BUCKET:-windypro-storage}
      - R2_ENDPOINT=${R2_ENDPOINT:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - NODE_ID=node-r2
      - NODE_NAME=Cloudflare R2
      - NODE_ENV=production
    volumes:
      - storage_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8100/health" ]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Nginx Reverse Proxy (SSL, WS, rate limiting) ──
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    depends_on:
      - web
      - api
      - account-server
      - translate-api
      - cloud-storage
    restart: unless-stopped

  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: windy_pro
      POSTGRES_USER: windy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U windy" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (rate limiting + session cache) ──
  redis:
    image: redis:7-alpine
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
  model_cache:
  account_data:
  translate_models:
  translate_data:
  storage_data:
