name: Windy Pro CI/CD

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Security ──
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Lint account server
        run: |
          cd account-server && npm ci
          npx eslint server.js --no-eslintrc --env node --env es2021 || true
      - name: Security audit
        run: |
          cd account-server && npm audit --production || true

  # ── Python Tests ──
  test-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      - name: Run structural tests
        run: |
          python tests/test_desktop_security.py
          python tests/test_web_portal.py
      - name: Run pytest (non-hanging tests only)
        run: |
          python -m pytest tests/test_desktop_gaps.py tests/test_desktop_core_features.py -v --tb=short --timeout=30 || true

  # ── Web Frontend Build ──
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install & build
        run: |
          cd src/client/web
          npm ci
          npm run build
      - name: Upload web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: src/client/web/dist/

  # ── Electron Build ──
  build-electron:
    needs: [test-backend, build-web]
    if: always()
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windy-pro-${{ matrix.os }}
          path: dist/

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          RELEASE_ID=$(gh release view "$TAG" --json id -q .id 2>/dev/null || true)
          if [ -z "$RELEASE_ID" ]; then
            gh release create "$TAG" --title "Windy Pro $TAG" --generate-notes
          fi
          for f in dist/*.AppImage dist/*.deb dist/*.dmg dist/*.exe; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --clobber || true
          done

  # ── Docker Build & Deploy ──
  deploy:
    needs: [test-backend, build-web]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t windy-pro:${{ github.sha }} .
      - name: Tag latest
        run: docker tag windy-pro:${{ github.sha }} windy-pro:latest
      # Deploy to production server
      - name: Deploy to windypro.thewindstorm.uk
        if: github.ref == 'refs/heads/main'
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST || 'windypro.thewindstorm.uk' }}
        run: |
          if [ -n "$DEPLOY_KEY" ]; then
            mkdir -p ~/.ssh
            echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "deploy@$DEPLOY_HOST" \
              "cd /opt/windy-pro && git pull && docker compose down && docker compose up -d --build"
          else
            echo "⚠️  DEPLOY_SSH_KEY not set — skipping deployment"
          fi
