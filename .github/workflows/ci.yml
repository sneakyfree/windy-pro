name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ── Account Server: Type Check + Tests ──
  test-account-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # account-server depends on @windy-pro/contracts via
      # file:../shared/contracts. The contracts package itself depends on
      # zod. With npm's file: protocol the contracts deps don't get
      # installed unless we run npm ci inside that directory too.
      - run: cd shared/contracts && npm ci
      - run: cd account-server && npm ci
      - run: cd account-server && npm test
      - run: cd account-server && npx tsc --noEmit

  # ── Python Backend Tests ──
  # Python 3.10 was dropped from the matrix because the pinned numpy
  # (>=2.3) requires Python 3.11+, and Windy Pro ships its own 3.11
  # interpreter via python-build-standalone — the 3.10 lane wasn't
  # reflecting any real user environment, just blocking CI.
  # fail-fast disabled so a single version's failure doesn't cancel
  # the others (we want signal from all supported lanes).
  test-backend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      - name: Run structural tests
        run: |
          python tests/test_desktop_security.py
          python tests/test_web_portal.py
      - name: Run pytest
        id: pytest
        continue-on-error: true
        run: |
          python -m pytest tests/test_desktop_gaps.py tests/test_desktop_core_features.py -v --tb=short --timeout=30
      - name: Report pytest outcome
        if: steps.pytest.outcome == 'failure'
        run: |
          echo "::warning::Python tests failed (non-blocking). Review test output above."
          echo "## Python Test Failures" >> $GITHUB_STEP_SUMMARY
          echo "pytest exited with failures. These are non-blocking until dependencies are fully configured." >> $GITHUB_STEP_SUMMARY
          echo "See the 'Run pytest' step output for details." >> $GITHUB_STEP_SUMMARY

  # ── Web Portal Build ──
  build-web-portal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd src/client/web && npm ci && npm run build
      - name: Upload web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: src/client/web/dist/

  # ── Desktop Build ──
  build-desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build --if-present

  # ── Installer Unit Tests ──
  # Targets the safety-critical install path: the CleanSlate kill-guard
  # (must never include the wizard's own pid), the bundled-assets layout
  # detection (must work for both flat and legacy layouts), and the
  # withTimeout helper (must surface labeled timeouts so a hung wizard
  # never appears as a silent 0% spinner).
  test-installer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Guard against legacy venv resurrection
        # See scripts/ci/check-no-legacy-venv.sh for context.
        run: bash scripts/ci/check-no-legacy-venv.sh
      - name: i18n coverage check (P3)
        # Every data-i18n key in wizard.html must exist in every
        # locale of wizard-i18n.json. See scripts/ci/check-i18n-coverage.sh
        # and docs/I18N-AUDIT.md.
        run: bash scripts/ci/check-i18n-coverage.sh
      - name: Error-code ratchet
        # P7: count of raw `throw new Error` in the install path
        # must not increase. New code uses WindyError.from('WINDY-NNN').
        # See scripts/ci/check-error-codes.sh + docs/ERRORS.md.
        run: bash scripts/ci/check-error-codes.sh
      - name: Run installer + security unit tests
        # Includes SEC-PAIR-1 (path traversal) and SEC-WIZARD-1 (Stripe
        # URL allowlist) regression pins. See docs/SECURITY-AUDIT-2026-04.md.
        run: npx jest tests/installer-bundled-assets.test.js tests/installer-clean-slate.test.js tests/installer-wizard-logger.test.js tests/installer-errors.test.js tests/pair-download-manager.security.test.js tests/wizard-main.security.test.js tests/installer-windows-paths.test.js --testEnvironment=node --ci
      - name: Run renderer unit tests (P4)
        # transcript-format (pure functions) + signup-banner (jsdom).
        # Each new module extracted from app.js for testability adds
        # coverage here. See tests/renderer-*.test.js.
        run: npx jest tests/renderer-transcript-format.test.js tests/renderer-signup-banner.test.js tests/lib-timeout.test.js tests/crash-summary.test.js --ci
      - name: Run logger tests (P5)
        # Structured JSON-lines + redaction + rotation.
        run: npx jest tests/logger.test.js --forceExit --testTimeout=15000 --ci

  # ── Electron Release Builds (multi-platform, tag-triggered) ──
  build-electron:
    needs: [test-account-server, test-backend, build-web-portal]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windy-pro-${{ matrix.os }}
          path: dist/
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          RELEASE_ID=$(gh release view "$TAG" --json id -q .id 2>/dev/null || true)
          if [ -z "$RELEASE_ID" ]; then
            gh release create "$TAG" --title "Windy Pro $TAG" --generate-notes
          fi
          for f in dist/*.AppImage dist/*.deb dist/*.dmg dist/*.exe; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --clobber || true
          done

  # ── Docker Build & Deploy ──
  deploy:
    needs: [test-account-server, build-web-portal]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f account-server/Dockerfile -t windy-pro:${{ github.sha }} .
      - name: Tag latest
        run: docker tag windy-pro:${{ github.sha }} windy-pro:latest
      - name: Deploy to windyword.ai
        if: github.ref == 'refs/heads/main'
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST || 'windyword.ai' }}
        run: |
          if [ -n "$DEPLOY_KEY" ]; then
            mkdir -p ~/.ssh
            echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "deploy@$DEPLOY_HOST" \
              "cd /opt/windy-pro && git pull && docker compose down && docker compose up -d --build"
          else
            echo "DEPLOY_SSH_KEY not set — skipping deployment"
          fi
