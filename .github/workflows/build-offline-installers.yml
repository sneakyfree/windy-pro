name: Build Offline Installers (Win + Linux)

# Full-OFFLINE Reader builds: same as build-installer.yml's win/linux jobs, but with all
# 7 lean CT2 engines fetched into extraResources/model/ before packaging (~4.3 GB each),
# then uploaded straight to R2 (downloads.windyword.ai) — no routing multi-GB through a
# dev machine. Manual trigger only.
on:
  workflow_dispatch: {}
  # workflow_dispatch only works once a workflow is on the default branch. Until then,
  # pushing this branch's content to `ci/offline-build` fires the run.
  push:
    branches: [ 'ci/offline-build' ]

env:
  WINDY_EDITION: reader
  R2_ENDPOINT: https://193b347aedeaafe35de0b5a534b2d9aa.r2.cloudflarestorage.com
  R2_BUCKET: s3://windyword-releases
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: auto

jobs:
  win-offline:
    name: Windows x64 (offline)
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install npm deps
        run: npm ci
      - name: Build portable Python+wheels bundle (win-x64)
        run: node scripts/build-portable-bundle.js --target win-x64
      - name: Stage bundle into extraResources/
        run: node scripts/stage-portable-bundle.js --target win-x64
      - name: Assert ffmpeg is bundled (guards the ENOENT-every-transcription regression)
        shell: bash
        run: |
          test -f extraResources/ffmpeg/ffmpeg.exe \
            || { echo "::error::extraResources/ffmpeg/ffmpeg.exe missing — Windows build would ship with no ffmpeg and every transcription would fail"; exit 1; }
          echo "ffmpeg present: $(ls -la extraResources/ffmpeg/ffmpeg.exe)"
      - name: Fetch 7 lean engines into extraResources/model (OFFLINE bundle)
        shell: bash
        run: bash scripts/ci/fetch-engines-ci.sh
      - name: Show staged model size
        shell: bash
        run: du -sh extraResources/model || true
      # NSIS's 32-bit makensis.exe can't mmap a >4GB payload ("failed creating mmap"),
      # so an offline (~4.3GB) build must ship as a portable ZIP, not an installer.
      - name: Build portable ZIP (with models)
        run: npx electron-builder --win zip --x64 --publish never
      - name: Upload offline ZIP to R2
        shell: bash
        run: |
          ZIP=$(find dist -maxdepth 1 -name "*.zip" | head -1)
          echo "uploading: $ZIP ($(du -h "$ZIP" | cut -f1))"
          aws s3 cp "$ZIP" "$R2_BUCKET/Windy-Word-Reader-Offline-win-x64.zip" \
            --endpoint-url "$R2_ENDPOINT" --content-type application/zip --only-show-errors
          echo "verify:"; curl -sI "https://downloads.windyword.ai/Windy-Word-Reader-Offline-win-x64.zip" | grep -iE "^HTTP|content-length"

  linux-offline:
    name: Linux x64 (offline)
    if: true   # 2026-07-02 recut: rebuild for bundled-ffmpeg fix + NLLB translate model
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install OS deps for AppImage
        run: sudo apt-get update && sudo apt-get install -y libfuse2 portaudio19-dev libasound2-dev
      - name: Install npm deps
        run: npm ci
      - name: Build portable Python+wheels bundle (linux-x64)
        run: node scripts/build-portable-bundle.js --target linux-x64
      - name: Stage bundle into extraResources/
        run: node scripts/stage-portable-bundle.js --target linux-x64
      - name: Assert ffmpeg is bundled (guards the ENOENT-every-transcription regression)
        run: |
          test -f extraResources/ffmpeg/ffmpeg \
            || { echo "::error::extraResources/ffmpeg/ffmpeg missing — Linux build would ship with no ffmpeg and every transcription would fail"; exit 1; }
          echo "ffmpeg present: $(ls -la extraResources/ffmpeg/ffmpeg)"
      - name: Fetch 7 lean engines into extraResources/model (OFFLINE bundle)
        run: bash scripts/ci/fetch-engines-ci.sh
      - name: Show staged model size
        run: du -sh extraResources/model || true
      - name: Build AppImage (with models)
        run: npx electron-builder --linux AppImage --x64 --publish never
      - name: Upload offline AppImage to R2
        run: |
          IMG=$(find dist -maxdepth 1 -name "*.AppImage" | head -1)
          echo "uploading: $IMG ($(du -h "$IMG" | cut -f1))"
          aws s3 cp "$IMG" "$R2_BUCKET/Windy-Word-Reader-Offline-linux-x86_64.AppImage" \
            --endpoint-url "$R2_ENDPOINT" --content-type application/octet-stream --only-show-errors
          echo "verify:"; curl -sI "https://downloads.windyword.ai/Windy-Word-Reader-Offline-linux-x86_64.AppImage" | grep -iE "^HTTP|content-length"

  mac-arm64-offline:
    name: macOS arm64 (offline, signed+notarized)
    runs-on: macos-14          # Apple Silicon — arch-native python/wheels/ffmpeg
    timeout-minutes: 120
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install npm deps
        run: npm ci
      - name: Build portable Python+wheels bundle (mac-arm64)
        run: node scripts/build-portable-bundle.js --target mac-arm64
      - name: Stage bundle into extraResources/
        run: node scripts/stage-portable-bundle.js --target mac-arm64
      - name: Assert ffmpeg is bundled (guards the ENOENT-every-transcription regression)
        run: |
          test -f extraResources/ffmpeg/ffmpeg \
            || { echo "::error::extraResources/ffmpeg/ffmpeg missing — every transcription would fail"; exit 1; }
          echo "ffmpeg present: $(ls -la extraResources/ffmpeg/ffmpeg)"
      - name: Fetch 7 lean engines + NLLB into extraResources/model (OFFLINE bundle)
        run: bash scripts/ci/fetch-engines-ci.sh
      - name: Show staged model size
        run: du -sh extraResources/model || true
      - name: Build web + stamp Reader edition
        run: npm run build:web && npm run stamp:reader
      # Repo is pre-configured for signed+notarized mac builds (package.json build.mac:
      # notarize:true, hardenedRuntime, entitlements, afterpack-sign-bundled.cjs). With the
      # CSC_* + APPLE_* env above, electron-builder signs the app (temp keychain) and
      # notarizes via @electron/notarize during the build.
      - name: Build signed + notarized arm64 DMG
        run: npx electron-builder --mac dmg --arm64 --publish never
      - name: Staple + verify notarization
        run: |
          DMG="$(ls -t dist/*arm64*.dmg 2>/dev/null | head -1)"
          [ -f "$DMG" ] || { echo "::error::no arm64 DMG produced"; exit 1; }
          echo "built: $DMG ($(du -h "$DMG" | cut -f1))"
          xcrun stapler staple "$DMG" || true
          xcrun stapler validate "$DMG" || { echo "::error::DMG not stapled — notarization failed"; exit 1; }
          spctl -a -vvv -t open --context context:primary-signature "$DMG" 2>&1 | head -4
          echo "DMG=$DMG" >> "$GITHUB_ENV"
      # Staging key ONLY — a human verifies spctl/stapler on the downloaded file before this
      # is promoted to the canonical Windy-Word-arm64.dmg the site + go.sh serve.
      - name: Upload to R2 STAGING (promote to canonical after manual verify)
        run: |
          aws s3 cp "$DMG" "$R2_BUCKET/staging/Windy-Word-Reader-arm64.dmg" \
            --endpoint-url "$R2_ENDPOINT" --content-type application/x-apple-diskimage --only-show-errors
          echo "verify:"; curl -sI "https://downloads.windyword.ai/staging/Windy-Word-Reader-arm64.dmg" | grep -iE "^HTTP|content-length"
